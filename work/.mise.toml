# ~/work/.mise.toml
# Work-only tools - activated when inside ~/work/ subtree
# Installed via: mise install (from ~/work/)

[tools]
awscli = "latest"
"aws-sso" = "latest"
"aws-vault" = "latest"
dive = "latest"
"aqua:ankitpokhrel/jira-cli" = "latest"
helm = "latest"
k9s = "latest"
kafkactl = "latest"
kind = "latest"
kubectl = "latest"
kustomize = "latest"
opentofu = "latest"
terraform = "latest"
